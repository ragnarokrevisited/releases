<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ragnarok Revisited Launcher</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .status {
      padding: 0.75rem 1.5rem;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .progress-bar {
      width: 300px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      margin: 1rem auto 0;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #4a9eff;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ragnarok Revisited</h1>
    <p class="subtitle">Checking for updates...</p>
    <div class="status" id="status">Connecting to patch server...</div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress"></div>
    </div>
  </div>
  <script>
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (data.status) {
        document.getElementById('status').textContent = data.status;
      }
      if (data.progress !== undefined) {
        document.getElementById('progress').style.width = data.progress + '%';
      }
    });
  </script>
</body>
</html>
